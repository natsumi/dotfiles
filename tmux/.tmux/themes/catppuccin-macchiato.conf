# Catppuccin (macchiato)
# https://github.com/catppuccin/tmux

# Flavor: latte, frappe, macchiato, mocha
set -g @catppuccin_flavor 'macchiato'

# Window styling
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_window_number_position "left"

# Date/time format
set -g @catppuccin_date_time_text " %a %b %d  %H:%M"

# Status bar
set -g status-left ""
set -g status-right-length 100
set -gF status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_session}#{E:@catppuccin_status_date_time}"

# Pane styling — make the active pane easy to spot
set -g pane-border-lines heavy
set -g pane-border-style 'fg=#494d64'              # inactive border: surface1
set -g pane-active-border-style 'fg=#f5a97f,bold'  # active border: peach
set -g window-style 'bg=#24273a'                   # inactive pane bg: macchiato base
set -g window-active-style 'bg=#363a4f'            # active pane bg: surface0 (lighter than base)
