# remap prefix to Control + s
unbind C-b
set -g prefix C-s
bind C-s send-prefix


###############
# TMUX SETTINGS
###############

# Massive scrollback history
set -g history-limit 100000
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',*:RGB'
set -s extended-keys on
set -as terminal-features ',*:extkeys'
set -as terminal-features ',*:hyperlinks'
set -g allow-passthrough on

# Allow fast key repeats
set -g repeat-time 0
# address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0
# super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# enable vim focus events
set -g focus-events on

# fix mouse scroll issues using the tmux-better-mouse-mode plugin
set-option -g mouse on

# start window numbers at 1 to match keyboard order with tmux window order
set -g base-index 1
set -g pane-base-index 1

# split window and fix path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

#synchronize all panes in a window
bind y setw synchronize-panes

# match pane movements to vim
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize panes
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Reload tmux config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

###############
# Look and Feel
###############
# status bar
set-option -g status-position top

# Use vim keybindings in copy mode
setw -g mode-keys vi

###############
# KEY BINDINGS
###############
# Setup 'v' to begin selection as in Vim
# bind-key -T copy-mode-vi 'v' send -X begin-selection
# bind-key -T copy-mode-vi 'y' send -X copy-pipe "reattach-to-user-namespace pbcopy"

# Update default binding of `Enter` to also use copy-pipe
# unbind -t vi-copy Enter
# bind-key -t vi-copy Enter copy-pipe "reattach-to-user-namespace pbcopy"
# unbind -T copy-mode-vi Enter
# bind-key -T copy-mode-vi 'Enter' send -X copy-pipe "reattach-to-user-namespace pbcopy"

# easier and faster switching between next/prev window
bind C-p previous-window
bind C-n next-window

# TO VIEW KEYBINDINGS
# tmux list-keys -t vi-copy
#

# TMUX Plugin Manager
# prefix + I - install plugins
# prefix + U - update plugins
# prefix + alt + u - uninstall unused plugins

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Theme — uncomment exactly one block. catppuccin/tmux and rose-pine/tmux both
# clone to ~/.tmux/plugins/tmux/ (tmux-plugins/tpm#273), so only one can be
# active at a time. The rebound `prefix + I` below wipes the dir before install.

# Catppuccin
set -g @plugin 'catppuccin/tmux#v2.1.3'
source-file ~/.tmux/themes/catppuccin-macchiato.conf

# Rosé Pine
# set -g @plugin 'rose-pine/tmux'
# source-file ~/.tmux/themes/rose-pine-dawn.conf

set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.tmux/plugins/"

# Auto-install TPM if missing
if "test ! -d ~/.tmux/plugins/tpm" {
  display-message "Installing tpm..."
  run "git clone --depth 1 https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins"
}

# Local config
if-shell "[ -f ~/.tmux.conf.local ]" 'source ~/.tmux.conf.local'

# Initializes TMUX plugin manager.
# Keep this line at the very bottom of tmux.conf.
run '~/.tmux/plugins/tpm/tpm'

# Wipe ~/.tmux/plugins/tmux before installing so rose-pine/tmux and catppuccin/tmux
# can swap cleanly despite the TPM directory-name collision (tmux-plugins/tpm#273).
bind I run-shell "rm -rf ~/.tmux/plugins/tmux && ~/.tmux/plugins/tpm/bindings/install_plugins"
