# /etc/ssh/sshd_config.d/99-vps-hardening.conf — managed by vps-bootstrap
Port ${SSH_PORT}
PasswordAuthentication no
PermitRootLogin prohibit-password
LoginGraceTime 30
MaxAuthTries 3
MaxSessions 3
X11Forwarding no
PrintMotd no
GSSAPIAuthentication no
KbdInteractiveAuthentication no
AllowUsers ${ALLOW_USERS}
ClientAliveInterval 300
ClientAliveCountMax 2
Ciphers aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256
KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512

# Suppress OS info in the pre-auth version string. Default openssh on
# Ubuntu advertises e.g. "SSH-2.0-OpenSSH_9.6p1 Ubuntu-3ubuntu13.4",
# which Shodan / mass-exploit campaigns key off when a new CVE drops.
DebianBanner no

# Path to an optional pre-login banner (legal notice, contact info).
# The ssh module installs /etc/issue.net with a simple notice — empty
# file is treated as "no banner".
Banner /etc/issue.net
