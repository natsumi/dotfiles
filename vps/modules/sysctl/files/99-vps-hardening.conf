# /etc/sysctl.d/99-vps-hardening.conf — managed by vps-bootstrap
#
# Server-tuned kernel and network knobs. Each `.conf.all.*` setting
# applies to every existing network interface; the matching `.default.*`
# setting becomes the template for any new interface created later.
# Both forms are needed for the value to actually take effect everywhere.


# ── Memory ───────────────────────────────────────────────────────────
# How eagerly the kernel swaps idle pages out of RAM. Default is 60
# (laptop-friendly); on a server we'd rather keep things in RAM and only
# swap when memory is genuinely tight.
vm.swappiness = 10


# ── Anti-spoofing ────────────────────────────────────────────────────
# Reverse-path filtering: drop a packet if the kernel can't route a
# reply back via the same interface it arrived on. Catches IP spoofing.
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Don't reply to ICMP echo (ping) sent to broadcast/multicast addresses.
# Mitigates Smurf-style amplification attacks.
net.ipv4.icmp_echo_ignore_broadcasts = 1


# ── ICMP redirects ───────────────────────────────────────────────────
# Don't accept ICMP redirect messages — an attacker on the same network
# could otherwise tell us "send your traffic to X instead" and MITM us.
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Don't *send* ICMP redirects either. Only routers should; we're a host.
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0


# ── Source routing ───────────────────────────────────────────────────
# Reject packets that try to dictate their own path through the network
# (an attacker could use this to bypass firewall rules).
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0


# ── TCP ──────────────────────────────────────────────────────────────
# SYN-flood protection: when the half-open connection queue fills up,
# the kernel falls back to issuing cryptographic SYN cookies instead of
# dropping new connections. Cheap insurance against trivial DoS.
net.ipv4.tcp_syncookies = 1

# Mitigates the CVE-1999-0913 TIME_WAIT assassination hazard — drops
# any RST packet that arrives during the TIME_WAIT state instead of
# letting an attacker terminate someone else's connection.
net.ipv4.tcp_rfc1337 = 1

# Don't trust ICMP "unreachable" responses sent in reply to broadcast
# frames; they're often forged.
net.ipv4.icmp_ignore_bogus_error_responses = 1

# "Secure" redirects only accept ICMP redirects from a default gateway,
# but we already disable redirects entirely above — set this off too so
# nothing slips through.
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# Log packets with impossible source addresses ("martians") to dmesg.
# Useful early-warning signal that something is probing the box.
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1


# ── Kernel info disclosure ───────────────────────────────────────────
# Hide kernel pointers in /proc (e.g. /proc/kallsyms) from non-root
# readers. Stops leaks of KASLR base address that local attackers use
# to bootstrap kernel exploits.
kernel.kptr_restrict = 2

# Restrict reading the kernel ring buffer (dmesg) to root only — it
# routinely contains addresses, hardware info, and crash diagnostics.
kernel.dmesg_restrict = 1


# ── Privilege-escalation hardening ───────────────────────────────────
# Disable kexec_load: an attacker with root could otherwise replace the
# running kernel without a reboot. We don't do live kernel updates here.
kernel.kexec_load_disabled = 1

# Don't write core dumps for setuid binaries — they could leak secrets
# from privileged processes into a file readable by the invoking user.
fs.suid_dumpable = 0

# Restrict ptrace to direct parent → child relationships. Stops one
# unprivileged process from attaching to another (e.g. reading memory
# of your shell from a compromised container or service).
kernel.yama.ptrace_scope = 1


# ── BPF restrictions ─────────────────────────────────────────────────
# Require root to load BPF programs. Closes a class of historical
# privilege-escalation paths via verifier bugs.
kernel.unprivileged_bpf_disabled = 1

# Harden the BPF JIT against Spectre-style speculative-execution
# attacks (constant blinding, etc.).
net.core.bpf_jit_harden = 2
